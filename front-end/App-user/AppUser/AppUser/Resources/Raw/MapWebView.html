<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <title>Map</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <style>
        body { margin: 0; padding: 0; overflow: hidden; background-color: #f8f9fa; }
        #map { width: 100vw; height: 100vh; }
    </style>
</head>
<body>
    <div id="map"></div>
    <script>
        var map = L.map('map').setView([10.7744, 106.7015], 13);
        
        L.tileLayer('https://{s}.basemaps.cartocdn.com/rastertiles/voyager/{z}/{x}/{y}{r}.png', {
            attribution: '&copy; OpenStreetMap &copy; CARTO',
            maxZoom: 20
        }).addTo(map);

        var markers = [];
        var userMarker = null;

        var userIcon = L.icon({
            iconUrl: 'https://raw.githubusercontent.com/pointhi/leaflet-color-markers/master/img/marker-icon-2x-blue.png',
            shadowUrl: 'https://cdnjs.cloudflare.com/ajax/libs/leaflet/0.7.7/images/marker-shadow.png',
            iconSize: [25, 41],
            iconAnchor: [12, 41],
            popupAnchor: [1, -34],
            shadowSize: [41, 41]
        });

        var poiIcon = L.icon({
            iconUrl: 'https://raw.githubusercontent.com/pointhi/leaflet-color-markers/master/img/marker-icon-2x-orange.png',
            shadowUrl: 'https://cdnjs.cloudflare.com/ajax/libs/leaflet/0.7.7/images/marker-shadow.png',
            iconSize: [25, 41],
            iconAnchor: [12, 41],
            popupAnchor: [1, -34],
            shadowSize: [41, 41]
        });

        // Hàm này sẽ dùng WebView.Eval() để gọi từ C#
        function updatePOIs(jsonString) {
            // Xoá marker rũ
            markers.forEach(function(m) { map.removeLayer(m); });
            markers = [];

            var data = JSON.parse(jsonString);
            var bounds = [];
            data.forEach(function(poi) {
                if(poi.Lat && poi.Lng) {
                    var m = L.marker([poi.Lat, poi.Lng], {icon: poiIcon})
                        .addTo(map)
                        .bindPopup('<b style="font-family:sans-serif;font-size:14px;">' + poi.Name + '</b><br/><span style="color:gray;font-size:12px;">' + poi.Address + '</span>');
                    markers.push(m);
                    bounds.push([poi.Lat, poi.Lng]);
                }
            });

            if(bounds.length > 0) {
                map.fitBounds(bounds, { padding: [30, 30] });
            }
        }

        function updateUserLocation(lat, lng) {
            if(userMarker) {
                map.removeLayer(userMarker);
            }
            userMarker = L.marker([lat, lng], {icon: userIcon, zIndexOffset: 1000})
                .addTo(map)
                .bindPopup('<b style="font-family:sans-serif;">Vị trí của bạn</b>');
        }
    </script>
</body>
</html>
